name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug and how to reproduce it.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application is affected?
      options:
        - Setup Wizard
        - Node Management
        - Preflight Checks
        - Role Assignment
        - Deployment
        - API Integration
        - Dashboard
        - UI/UX
        - Build/Config
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Paste any relevant log output or error messages.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running?
      placeholder: e.g. 1.0.0
    validations:
      required: false
